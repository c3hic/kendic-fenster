<html lang="bs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png?v=2" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kendic-fenster.ba/" />
    <meta property="og:title" content="KENDIĆ FENSTER - Preciznost koja pravi razliku" />
    <meta property="og:description" content="Vrhunska usluga rezanja i kantiranja iverice po mjeri, uz širok asortiman okova za vaš savršen enterijer." />
    <meta property="og:image" content="https://kendic-fenster.ba/logo.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://kendic-fenster.ba/" />

    <!-- Internationalization -->
    <link rel="alternate" hreflang="bs" href="https://kendic-fenster.ba/" />
    <link rel="alternate" hreflang="sl" href="https://kendic-fenster.ba/" />
    <link rel="alternate" hreflang="de" href="https://kendic-fenster.ba/" />
    <link rel="alternate" hreflang="en" href="https://kendic-fenster.ba/" />
    <link rel="alternate" hreflang="x-default" href="https://kendic-fenster.ba/" />

    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Redirekcija nakon logina ili postavljanja lozinke -->
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
